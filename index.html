// UTILIDADES DE CLASIFICACIÓN DE INSUMOS
// ─────────────────────────────────────────────
function clasificarInsumo(nombre) {
  const n = nombre.toLowerCase();
  // Sustratos (J- prefix o keywords claros)
  const kwSust = ["j-","musgo bolsa","tierra abonada","resaca","pinocha","azalea sustrato",
    "azalea ferticam","compost","perlita","turba","sustrato cactus","sustrato orquid",
    "ferticam","vermiculita","j-verculita","turbamambo","compostero"];
  for (const kw of kwSust) if (n.includes(kw)) return "Sustratos";
  // Fertilizantes
  const kwFert = ["fertiliz","abono","humus","guano","micorriz","trichoderm","polyamino",
    "acrecio","fixa mzn","megagreen","bioalgas","sal hidrop","hormona polvo",
    "hierro liq","melaza","acido humic","cesped recuper","ljf-","ljf ",
    "fosfato","urea","triple 15","hidrocomp","jf ","jf-","vital fitorr",
    "lecithin","amino x","savia anti","brillo foliar","lustre vegetal",
    "d-humus","hortal brillo","turbamambo","turbambo","sal hidro"];
  for (const kw of kwFert) if (n.includes(kw)) return "Fertilizantes";
  // Insecticidas (catch-all para el resto de insumos)
  return "Insecticidas";
}

const REGISTRO_KEY = 'lyl_registro_v1';
function loadRegistro() {
  try { return JSON.parse(localStorage.getItem(REGISTRO_KEY)||'[]'); } catch(e) { return []; }
}
function saveRegistro(data) {
  try { localStorage.setItem(REGISTRO_KEY, JSON.stringify(data)); } catch(e) {}
}
function agregarRegistro(entry) {
  const data = loadRegistro();
  data.unshift({...entry, id: Date.now(), estado: 'enviado', fechaRegistro: new Date().toISOString()});
  saveRegistro(data);
}

// Procesa catálogo raw → enriquece material de insumos con subcategoría
function enriquecerProducto(p) {
  if (p.material !== "Insumos") return p;
  return { ...p, material: clasificarInsumo(p.articulo) };
}

function getFotos(articulo, material) {
  const key = articulo + "||" + (material || "");
  if (FOTOS_MODELOS[key]) return FOTOS_MODELOS[key];
  // Para fibrocemento buscar sin acabado (quitar el " · Cruda" etc.)
  const base = articulo.split(" · ")[0].trim();
  const key2 = base + "||" + (material || "");
  return FOTOS_MODELOS[key2] || [];
}

function CardGrilla({ grupo, onAgregar, descPct=0, modo, adminMode=false, expandido, onToggle }) {
  const color = MODOS[modo]?.color || "#333";
  const dc = MAT_COLORS[grupo.material] || "#888";
  const fotos = getFotos(grupo.articulo, grupo.material);
  const foto = fotos[0] || null;
  const [carouselIdx, setCarouselIdx] = React.useState(0);

  const precioDesde = () => {
    const precios = grupo.variantes.map(v =>
      grupo.material === "Fibrocemento" && v.acabados
        ? (v.min_cruda || v.may_cruda || v.precio)
        : (descPct > 0 ? pct(v.precio, descPct) : v.precio)
    );
    return Math.min(...precios);
  };

  return e('div', { style:{
      background:"#fff", borderRadius:12, border:"1px solid #e8e4de",
      overflow:"hidden", cursor:"pointer",
      gridColumn: expandido ? "span 2" : "span 1",
      boxShadow: expandido ? "0 4px 20px rgba(0,0,0,0.12)" : "0 1px 4px rgba(0,0,0,0.06)",
      transition:"box-shadow .2s" },
    onClick: onToggle
  },
    // Foto
    foto
      ? e('img', { src:foto, alt:grupo.articulo,
          style:{ width:"100%", aspectRatio:"1", objectFit:"cover", display:"block", background:"#f0ede8" },
          onError: ev => { ev.target.style.display="none"; }
        })
      : e('div', { style:{ width:"100%", aspectRatio:"1", background:"linear-gradient(135deg,#f0ede8,#e8e4de)",
          display:"flex", alignItems:"center", justifyContent:"center", fontSize:36, color:"#ccc" } }, "🪴"),

    // Info
    e('div', { style:{ padding:"8px 10px 10px" } },
      e('div', { style:{ fontWeight:700, fontSize:13, color:"#1a1a1a",
          whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" } }, grupo.articulo),
      e('div', { style:{ display:"flex", alignItems:"center", gap:4, marginTop:2 } },
        e('div', { style:{ width:6, height:6, borderRadius:"50%", background:dc } }),
        e('span', { style:{ fontSize:10, color:"#999" } }, grupo.material)
      ),
      e('div', { style:{ marginTop:5, fontSize:12, fontWeight:700, color } },
        e('span', { style:{ fontSize:9, fontWeight:400, color:"#aaa" } }, "desde "),
        fmt(precioDesde())
      )
    ),

    // Panel expandido
    expandido && e('div', { style:{ borderTop:"1px solid #f0ede8" },
        onClick:ev=>ev.stopPropagation() },

      // Header del panel
      e('div', { style:{ display:"flex", alignItems:"center", gap:10, padding:"10px 14px 8px",
          background:"#fafaf9", borderBottom:"1px solid #f0ede8" } },
        fotos.length > 0 && e('img', { src:fotos[carouselIdx] || fotos[0],
          style:{ width:52, height:52, objectFit:"contain", borderRadius:10, background:"#f0ede8", flexShrink:0 },
          onError:ev=>{ev.target.style.display="none"} }),
        e('div', { style:{ flex:1 } },
          e('div', { style:{ fontWeight:700, fontSize:15, color:"#1a1a1a" } }, grupo.articulo),
          e('div', { style:{ display:"flex", alignItems:"center", gap:4, marginTop:2 } },
            e('div', { style:{ width:6, height:6, borderRadius:"50%", background:dc } }),
            e('span', { style:{ fontSize:11, color:"#999" } }, grupo.material)
          )
        ),
        e('button', { onClick:onToggle,
          style:{ padding:"5px 10px", borderRadius:8,
            border:"1px solid #ddd", background:"transparent",
            color:"#aaa", fontSize:13, cursor:"pointer", flexShrink:0 } }, "✕")
      ),

      // Carrusel de fotos (si hay más de 1)
      fotos.length > 0 && e('div', { style:{ position:"relative", background:"#f5f3ef",
          borderBottom:"1px solid #f0ede8", overflow:"hidden" } },
        e('img', { src:fotos[carouselIdx], alt:grupo.articulo,
          style:{ width:"100%", height:200, objectFit:"contain", display:"block", padding:8 },
          onError:ev=>{ ev.target.style.display="none"; }
        }),
        // Flechas
        fotos.length > 1 && e('button', {
          onClick:ev=>{ ev.stopPropagation(); setCarouselIdx(i=>(i-1+fotos.length)%fotos.length); },
          style:{ position:"absolute", left:8, top:"50%", transform:"translateY(-50%)",
            width:32, height:32, borderRadius:"50%", border:"none",
            background:"rgba(255,255,255,0.85)", fontSize:16, cursor:"pointer",
            display:"flex", alignItems:"center", justifyContent:"center",
            boxShadow:"0 1px 4px rgba(0,0,0,0.15)" }
        }, "‹"),
        fotos.length > 1 && e('button', {
          onClick:ev=>{ ev.stopPropagation(); setCarouselIdx(i=>(i+1)%fotos.length); },
          style:{ position:"absolute", right:8, top:"50%", transform:"translateY(-50%)",
            width:32, height:32, borderRadius:"50%", border:"none",
            background:"rgba(255,255,255,0.85)", fontSize:16, cursor:"pointer",
            display:"flex", alignItems:"center", justifyContent:"center",
            boxShadow:"0 1px 4px rgba(0,0,0,0.15)" }
        }, "›"),
        // Dots
        fotos.length > 1 && e('div', { style:{ position:"absolute", bottom:8, left:0, right:0,
            display:"flex", justifyContent:"center", gap:5 } },
          fotos.map((_, i) =>
            e('div', { key:i,
              onClick:ev=>{ ev.stopPropagation(); setCarouselIdx(i); },
              style:{ width: i===carouselIdx ? 18 : 6, height:6, borderRadius:3,
                background: i===carouselIdx ? color : "rgba(255,255,255,0.6)",
                cursor:"pointer", transition:"all .2s" }
            })
          )
        )
      ),

      // Variantes
      grupo.variantes.map((v, vi) => {
        if (grupo.material === "Fibrocemento" && v.acabados) {
          return e(VarianteFibro, { key:vi, v, grupo, descPct, pct, fmt, color, onAgregar, adminMode });
        }
        const precioFinal = descPct > 0 ? pct(v.precio, descPct) : v.precio;
        return e('div', { key:vi, style:{
            padding:"9px 12px",
            borderBottom: vi < grupo.variantes.length-1 ? "1px solid #f5f3ef" : "none",
            display:"flex", justifyContent:"space-between", alignItems:"center", gap:8 } },
          e('div', null,
            e('div', { style:{ fontSize:12, fontWeight:600, color:"#444" } }, v.medidas || "—"),
            e('div', { style:{ fontSize:14, fontWeight:700, color, marginTop:1 } }, fmt(precioFinal))
          ),
          e('button', {
            onClick:()=>onAgregar(grupo, v, precioFinal),
            style:{ padding:"6px 12px", borderRadius:8, border:"none",
              background:color, color:"#fff", fontSize:12, fontWeight:600,
              cursor:"pointer", whiteSpace:"nowrap" }
          }, "+ Agregar")
        );
      })
    )
  );
}

function VarianteFibro({ v, grupo, descPct, pct, fmt, color, onAgregar, compartirSel={}, toggleCompartir=null }) {
  const precios = [
    { key:"cruda", label:"Natural / Cruda",
      desc:"Sin tratamiento, color cemento natural. Apta para uso con impermeabilizante propio.",
      precio: v.min_cruda || v.may_cruda || v.precio },
    v.min_imp || v.may_imp ? { key:"imp", label:"Impermeabilizada",
      desc:"Sellado interior de alta calidad. Evita manchas de humedad en el exterior.",
      precio: v.min_imp || v.may_imp } : null,
    v.min_pint || v.may_pint ? { key:"pint", label:"Pintada",
      desc:"Impermeabilizada + pintura exterior en el color que elijas. Consultar colores disponibles.",
      precio: v.min_pint || v.may_pint } : null,
  ].filter(Boolean);

  return e('div', { style:{ padding:"8px 12px", borderBottom:"1px solid #f5f3ef" } },
    e('div', { style:{ fontSize:12, fontWeight:600, color:"#555", marginBottom:6, paddingBottom:4, borderBottom:"1px dashed #f0ede8" } }, v.medidas || "—"),
    e('div', { style:{ display:"flex", flexDirection:"column", gap:6 } },
      precios.map(op => {
        const precioFinal = descPct > 0 ? pct(op.precio, descPct) : op.precio;
        const vOp = { ...v, articulo: grupo.articulo + ' · ' + op.label, precio: precioFinal, acabadoLabel: op.label };
        return e('div', { key:op.key, style:{
            background: op.key==="cruda" ? "#fafafa" : op.key==="imp" ? "#f0f7f2" : "#f8f0ff",
            borderRadius:10, padding:"8px 10px",
            border: op.key==="cruda" ? "1px solid #eee" : op.key==="imp" ? "1px solid #c8e6d4" : "1px solid #e0c8f0"
          }},
          e('div', { style:{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:8 } },
            e('div', { style:{ flex:1 } },
              e('div', { style:{ fontSize:12, fontWeight:700,
                  color: op.key==="cruda" ? "#555" : op.key==="imp" ? "#2d6a4a" : "#6a2d8a" } },
                op.label),
              e('div', { style:{ fontSize:10, color:"#aaa", marginTop:2, lineHeight:1.4 } }, op.desc)
            ),
            e('div', { style:{ display:"flex", flexDirection:"column", alignItems:"flex-end", gap:4 } },
              e('span', { style:{ fontSize:14, fontWeight:700,
                  color: op.key==="cruda" ? "#333" : op.key==="imp" ? "#2d6a4a" : "#6a2d8a" } },
                fmt(precioFinal)),
              e('div', { style:{ display:"flex", gap:5, alignItems:"center" } },
                toggleCompartir && e('button', {
                  onClick:()=>{ const k=`${vOp.articulo}||${grupo.material}||${v.medidas}`; toggleCompartir(k,grupo,vOp,precioFinal); },
                  style:{ width:26, height:26, borderRadius:6, border:"1px solid #ddd",
                    background: compartirSel[`${vOp.articulo}||${grupo.material}||${v.medidas}`] ? "#25D366" : "transparent",
                    color: compartirSel[`${vOp.articulo}||${grupo.material}||${v.medidas}`] ? "#fff" : "#aaa",
                    fontSize:13, display:"flex", alignItems:"center", justifyContent:"center" }
                }, "✓"),
                e('button', {
                  onClick:()=>onAgregar(grupo, vOp, precioFinal),
                  style:{ padding:"4px 12px", borderRadius:7, border:"none", fontSize:11, fontWeight:600,
                    background: op.key==="cruda" ? "#888" : op.key==="imp" ? "#2d6a4a" : "#6a2d8a",
                    color:"#fff", whiteSpace:"nowrap" }
                }, "+ Agregar")
              )
            )
          )
        );
      })
    )
  );
}

function ProductoCard({ grupo, onAgregar, descPct=0, modo, adminMode=false, compartirSel={}, toggleCompartir=null }) {
  const color = MODOS[modo]?.color || "#333";
  const dc = MAT_COLORS[grupo.material] || "#888";
  const fotos = getFotos(grupo.articulo, grupo.material);

  return e('div', { style:{ background:"#fff", borderRadius:12, marginBottom:10,
      border:"1px solid #e8e4de", overflow:"hidden",
      boxShadow:"0 1px 4px rgba(0,0,0,0.06)" } },

    // ── CABECERA DEL MODELO ──
    e('div', { style:{ padding:"10px 12px 8px",
        borderBottom:"1px solid #f0ede8",
        display:"flex", justifyContent:"space-between", alignItems:"center",
        background:"#fafaf9" } },
      e('div', null,
        e('div', { style:{ fontWeight:700, fontSize:14, color:"#1a1a1a", letterSpacing:"0.01em" } }, grupo.articulo),
        e('div', { style:{ display:"flex", alignItems:"center", gap:5, marginTop:3 } },
          e('div', { style:{ width:7, height:7, borderRadius:"50%", background:dc, flexShrink:0 } }),
          e('span', { style:{ fontSize:11, color:"#888", fontWeight:500 } }, grupo.material)
        )
      ),
      toggleCompartir && e('button', {
        onClick:()=>{
          const key = grupo.articulo + "||" + grupo.material;
          const yaSelec = grupo.variantes.some(v => compartirSel[key + "||" + v.medidas]);
          grupo.variantes.forEach(v => {
            const k = key + "||" + v.medidas;
            const pf = descPct > 0 ? pct(v.precio, descPct) : v.precio;
            if (yaSelec && compartirSel[k]) toggleCompartir(k, grupo, v, pf);
            else if (!yaSelec && !compartirSel[k]) toggleCompartir(k, grupo, v, pf);
          });
        },
        style:{ fontSize:11, padding:"3px 9px", borderRadius:8,
          border:`1px solid ${color}`, background:"transparent",
          color, fontWeight:600, whiteSpace:"nowrap" }
      }, "+ sel.")
    ),

    // ── CUERPO: variantes a la izquierda, foto a la derecha ──
    e('div', { style:{ display:"flex" } },

      // Columna izquierda: variantes
      e('div', { style:{ flex:1, minWidth:0 } },
        grupo.variantes.map((v, vi) => {
          if (grupo.material === "Fibrocemento" && v.acabados) {
            return e(VarianteFibro, { key:vi, v, grupo, descPct, pct, fmt, color, onAgregar, adminMode, compartirSel, toggleCompartir });
          }
          const precioFinal = descPct > 0 ? pct(v.precio, descPct) : v.precio;
          const cKey = `${grupo.articulo}||${grupo.material}||${v.medidas}`;
          const seleccionado = compartirSel[cKey];
          return e('div', { key:vi, style:{
              padding:"9px 12px",
              borderBottom: vi < grupo.variantes.length-1 ? "1px solid #f5f3ef" : "none",
              display:"flex", justifyContent:"space-between", alignItems:"center",
              gap:8,
              background: seleccionado ? "#f0fff4" : "transparent" } },
            e('div', { style:{ flex:1, minWidth:0 } },
              e('div', { style:{ fontSize:12, fontWeight:600, color:"#444", marginBottom:3 } }, v.medidas || "—"),
              e('div', { style:{ display:"flex", gap:8, alignItems:"center", flexWrap:"wrap" } },
                e('span', { style:{ fontSize:14, fontWeight:700, color } }, fmt(precioFinal)),
                descPct > 0 && e('span', { style:{ fontSize:10, color:"#bbb", textDecoration:"line-through" } }, fmt(v.precio)),
                adminMode && v.costo && e('span', { style:{ fontSize:10, color:"#aaa",
                  background:"#f0f0f0", padding:"1px 5px", borderRadius:5 } },
                  `costo: ${fmt(v.costo)} · ${Math.round((precioFinal/v.costo-1)*100)}%`)
              ),
              grupo.material === "Rotomoldeado" && e('div', { style:{ display:"flex", gap:5, alignItems:"center", marginTop:5 } },
                ...[
                  { bg:"#f5f5f5", bd:"1px solid #ccc", label:"Blanco" },
                  { bg:"#1a1a1a", bd:"none", label:"Negro" },
                  { bg:"#7a7a7a", bd:"none", label:"Gris" },
                  { bg:"#c8a882", bd:"none", label:"Beige" },
                ].map(c => e('div', { key:c.label, style:{ display:"flex", flexDirection:"column", alignItems:"center", gap:2 } },
                  e('div', { style:{ width:13, height:13, borderRadius:"50%", background:c.bg, border:c.bd } }),
                  e('span', { style:{ fontSize:9, color:"#bbb" } }, c.label)
                ))
              )
            ),
            e('div', { style:{ display:"flex", gap:5, alignItems:"center", flexShrink:0 } },
              toggleCompartir && e('button', {
                onClick:()=>toggleCompartir(cKey, grupo, v, precioFinal),
                style:{ width:26, height:26, borderRadius:6, border:"1px solid #ddd",
                  background: seleccionado ? "#25D366" : "#fff",
                  color: seleccionado ? "#fff" : "#aaa",
                  fontSize:14, display:"flex", alignItems:"center", justifyContent:"center",
                  cursor:"pointer", flexShrink:0 }
              }, seleccionado ? "✓" : "□"),
              e('button', {
                onClick:()=>onAgregar(grupo, v, precioFinal),
                style:{ padding:"6px 12px", borderRadius:8,
                  border:`1px solid ${color}`, background:"transparent",
                  color, fontSize:12, fontWeight:600, whiteSpace:"nowrap" }
              }, "+ Agregar")
            )
          );
        })
      ),

      // Columna derecha: foto del modelo (UNA sola, sin miniaturas)
      fotos.length > 0 && e('div', { style:{
          width:100, flexShrink:0,
          display:"flex", alignItems:"center", justifyContent:"center",
          padding:"8px 8px 8px 4px",
          borderLeft:"1px solid #f0ede8",
          background:"#fafaf9" } },
        e('img', { src:fotos[0], alt:grupo.articulo,
          style:{ width:88, height:88, objectFit:"contain", borderRadius:8,
            background:"#f5f3ef", display:"block" },
          onError: ev => { ev.target.parentElement.style.display="none"; }
        })
      )
    )
  );
}

// MODO MINORISTA
// ─────────────────────────────────────────────
function ModoMinorista({ productos, onVolver, adminMode, buscarInicial="" }) {
  const color = MODOS.minorista.color;
  const [buscar, setBuscar] = useState(buscarInicial);
  const [vistaGrilla, setVistaGrilla] = useState(false);
  const [expandidoKey, setExpandidoKey] = useState(null);
  const [material, setMaterial] = useState("Todos");
  const [pintada, setPintada] = useState("Todos");
  const [descPct, setDescPct] = useState(0);
  const [precioMin, setPrecioMin] = useState("");
  const [precioMax, setPrecioMax] = useState("");
  const [carrito, setCarrito] = useState({});
  const [nombre, setNombre] = useState("");
  const [nota, setNota] = useState("");
  const [direccion, setDireccion] = useState("");
  const [vista, setVista] = useState(()=> presupuestoInicial?.items?.length ? "presupuesto" : "catalogo");
  React.useEffect(()=>{
    if (presupuestoInicial && onPresupuestoInicial) {
      if (presupuestoInicial.descuento_pct) setDescuento(String(presupuestoInicial.descuento_pct));
      onPresupuestoInicial();
    }
  },[]);
  const [enviado, setEnviado] = useState(false);

  const totalItems = Object.values(carrito).reduce((s,v)=>s+v.cantidad,0);

  const grupos = useMemo(()=>{
    const b = buscar.toLowerCase();
    const mats = material==="Todos"
      ? (b ? MATERIALES_TODOS : MATERIALES_TODOS)
      : [material];
    const filtrados = productos.filter(p=>{
      const inMat = material==="__MACETAS__" ? MATERIALES_MACETAS.includes(p.material)
        : material==="__INSUMOS__" ? MATERIALES_INSUMOS.includes(p.material)
        : material==="Todos" || p.material===material;
      const tokens = b.split(/\s+/).filter(Boolean);
      const texto = (p.articulo + " " + p.medidas).toLowerCase();
      const inBuscar = !b || tokens.every(t => texto.includes(t));
      const inPint = (p.material==="Fibrocemento"||p.material==="Fibra de Vidrio") || pintada==="Todos"||(pintada==="Pintada"&&p.pintada)||(pintada==="Sin pintar"&&!p.pintada);
      const pMin = precioMin ? p.precio >= parseFloat(precioMin) : true;
      const pMax = precioMax ? p.precio <= parseFloat(precioMax) : true;
      return inMat && inBuscar && inPint && pMin && pMax;
    });
    const map={};
    filtrados.forEach(p=>{
      const k=`${p.articulo}||${p.material}`;
      if(!map[k]) map[k]={...p,variantes:[]};
      map[k].variantes.push({medidas:p.medidas,precio:p.precio,
        acabados:p.acabados,min_cruda:p.min_cruda,min_imp:p.min_imp,min_pint:p.min_pint,
        may_cruda:p.may_cruda,may_imp:p.may_imp,may_pint:p.may_pint});
    });
    return Object.values(map);
  },[productos,buscar,material,pintada,precioMin,precioMax]);

  const agregar=(grupo,v,precio)=>{
    const articuloFinal = v.articulo || grupo.articulo;
    const key=`${articuloFinal}||${v.medidas}||${grupo.material}`;
    setCarrito(prev=>{
      const ex=prev[key];
      return {...prev,[key]:ex
        ?{...ex,cantidad:ex.cantidad+1}
        :{articulo:articuloFinal,medidas:v.medidas,material:grupo.material,
          pintada:grupo.pintada,precio,cantidad:1,_key:key}};
    });
  };

  const cambiarCant=(key,delta)=>setCarrito(prev=>{
    const it=prev[key]; if(!it) return prev;
    const n=it.cantidad+delta;
    if(n<=0){const{[key]:_,...r}=prev;return r;}
    return{...prev,[key]:{...it,cantidad:n}};
  });

  const totalPrecio=Object.values(carrito).reduce((s,v)=>s+v.precio*v.cantidad,0);

  const enviar=()=>{
    if(!nombre.trim()){alert("Ingresá tu nombre antes de enviar.");return;}
    if(!Object.keys(carrito).length){alert("Seleccioná al menos un producto.");return;}
    const items=Object.values(carrito);
    const fecha=new Date().toLocaleDateString("es-AR");
    let txt=`🌿 *Consulta de productos — LyL Macetas*\n`;
    txt+=`👤 *${nombre.trim()}*\n📅 ${fecha}\n\n*Productos de interés:*\n`;
    items.forEach(i=>{ txt+=`  • ${i.articulo}${i.medidas?" "+i.medidas:""} — ${i.cantidad} u.\n`; });
    if(descPct>0) txt+=`\n🏷 Descuento solicitado: ${descPct}%\n`;
    if(direccion.trim()) txt+=`\n📍 *Dirección:* ${direccion.trim()}\n`;
    if(nota.trim()) txt+=`\n📝 *Nota:* ${nota.trim()}\n`;
    txt+=`\n_Consulta enviada desde lylmacetas.com.ar_`;
    window.open(`https://wa.me/${WA}?text=${encodeURIComponent(txt)}`,"_blank");
    agregarRegistro({
      tipo: 'minorista',
      cliente: nombre.trim(),
      proyecto: direccion.trim() || '',
      items: Object.values(carrito).map(i=>({articulo:i.articulo,medidas:i.medidas,material:i.material,cantidad:i.cantidad,precio:i.precio})),
      subtotal: totalPrecio,
      descuento_pct: descPct,
      total: descPct > 0 ? Math.round(totalPrecio*(1-descPct/100)) : totalPrecio,
      fecha: new Date().toLocaleDateString('es-AR')
    });
    setEnviado(true);
  };

  return e('div', { style:{ maxWidth:480, margin:"0 auto", minHeight:"100vh", background:"#f8f6f2" } },
    e(Header, { modo:"minorista", color, fecha:FECHA_MIN, itemCount:totalItems,
      vistaActual:vista, onCambiarVista:setVista, onVolver }),

    vista==="catalogo" && e('div', null,
      // Banner descuento
      e('div', { style:{ padding:"10px 14px 0" } },
        e('div', { style:{ background:"#fff", borderRadius:10, padding:"10px 12px",
            border:"1px solid #e8e4de", marginBottom:0 } },
          e('div', { style:{ fontSize:11, color:"#777", marginBottom:6 } }, "Descuento especial:"),
          e('div', { style:{ display:"flex", gap:6 } },
            DESCUENTOS_MIN.map(d =>
              e('button', { key:d, onClick:()=>setDescPct(d), style:{
                flex:1, padding:"6px", borderRadius:8,
                border:`1px solid ${descPct===d ? color : "#ddd"}`,
                background: descPct===d ? color : "#fff",
                color: descPct===d ? "#fff" : "#777", fontSize:12, fontWeight:600 }
              }, d===0?"Sin desc.":`-${d}%`)
            )
          )
        )
      ),
      e(Filtros,{buscar,setBuscar,material,setMaterial,pintada,setPintada,color,modo:"minorista",precioMin,setPrecioMin,precioMax,setPrecioMax,onToggleVista:v=>{setVistaGrilla(v==="grilla");setExpandidoKey(null);},vistaActual:vistaGrilla?"grilla":"lista"}),
      e('div', { style:{ padding:"0 14px 80px" } },
        grupos.length===0
          ? e('div',{style:{textAlign:"center",color:"#aaa",padding:40}},"Sin resultados")
          : vistaGrilla
          ? e('div', { style:{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, padding:"0 0 10px" } },
              grupos.map((g,i) => {
                const gKey = g.articulo+"||"+g.material;
                return e(CardGrilla,{key:i,grupo:g,onAgregar:agregar,descPct,modo:"minorista",adminMode,
                  expandido:expandidoKey===gKey,
                  onToggle:()=>setExpandidoKey(expandidoKey===gKey?null:gKey)});
              })
            )
          : grupos.map((g,i)=>e(ProductoCard,{key:i,grupo:g,onAgregar:agregar,descPct,modo:"minorista",adminMode}))
      )
    ),

    vista==="presupuesto" && e('div', { style:{ padding:"12px 14px 80px", maxWidth:480, margin:"0 auto" } },
      enviado
        ? e('div',{style:{textAlign:"center",padding:40}},
            e('div',{style:{fontSize:48,marginBottom:16}},"✅"),
            e('div',{style:{fontSize:18,fontWeight:700,color,marginBottom:8}},"¡Consulta enviada!"),
            e('div',{style:{fontSize:13,color:"#666",marginBottom:24}},"Te respondemos a la brevedad."),
            e('button',{onClick:()=>{setCarrito({});setNombre("");setDireccion("");setNota("");setEnviado(false);setVista("catalogo");},
              style:{padding:"12px 24px",borderRadius:10,border:"none",background:color,color:"#fff",fontSize:14}},
              "Nueva consulta")
          )
        : e('div',null,
            e('div',{style:{background:"#fff",borderRadius:10,padding:14,border:"1px solid #e8e4de",marginBottom:10}},
              e(Input,{value:nombre,onChange:setNombre,placeholder:"Tu nombre *",style:{marginBottom:8}}),
              e(Input,{value:direccion,onChange:setDireccion,placeholder:"Dirección de entrega (opcional)",style:{marginBottom:8}}),
              e(Input,{value:nota,onChange:setNota,placeholder:"Nota o consulta adicional (opcional)"})
            ),
            Object.values(carrito).map((item,i)=>{
              const key=item._key||`${item.articulo}||${item.medidas}||${item.material}`;
              return e('div',{key:i,style:{background:"#fff",borderRadius:10,padding:"10px 12px",
                  marginBottom:6,border:"1px solid #e8e4de",display:"flex",justifyContent:"space-between",alignItems:"center"}},
                e('div',null,
                  e('div',{style:{fontSize:13,fontWeight:700,color:"#2c2c2c"}},item.articulo+(item.medidas?" "+item.medidas:"")),
                  e('div',{style:{fontSize:11,color:"#888",marginTop:2}},item.material+" · "+fmt(item.precio)+" c/u")
                ),
                e('div',{style:{display:"flex",alignItems:"center",gap:8}},
                  e('button',{onClick:()=>cambiarCant(key,-1),style:{width:26,height:26,borderRadius:"50%",border:`1px solid #ddd`,background:"transparent",color:"#666",fontSize:16}},"−"),
                  e('span',{style:{fontSize:14,fontWeight:700,minWidth:20,textAlign:"center"}},item.cantidad),
                  e('button',{onClick:()=>cambiarCant(key,1),style:{width:26,height:26,borderRadius:"50%",border:"none",background:color,color:"#fff",fontSize:16}},"+")
                )
              );
            }),
            e('div',{style:{background:"#f0f7f2",borderRadius:10,padding:"12px 14px",marginTop:8,border:"1px solid #c8e6c9"}},
              e('div',{style:{display:"flex",justifyContent:"space-between",fontSize:14,fontWeight:700,color:"#2d5a3d"}},
                e('span',null,`${totalItems} productos · referencia`),e('span',null,fmt(totalPrecio))
              ),
              e('div',{style:{fontSize:10,color:"#888",marginTop:4}},"* El presupuesto final puede incluir descuentos y envío.")
            ),
            e('button',{onClick:enviar,style:{width:"100%",padding:14,borderRadius:10,border:"none",background:"#25D366",color:"#fff",fontSize:14,fontWeight:700,marginTop:12}},"📲 Enviar consulta por WhatsApp")
          )
    )
  );
}

// ─────────────────────────────────────────────
// PRESUPUESTADOR COMPARTIDO (Mayorista + Clientes)
// ─────────────────────────────────────────────
function Presupuestador({ modo, productos, descFijo=null, onVolver, adminMode, buscarInicial="", presupuestoInicial=null, onPresupuestoInicial=null }) {
  const cfg = MODOS[modo];
  const color = cfg.color;
  const descOpciones = modo==="mayorista" ? DESCUENTOS_MAY : [0,5,10,15,20];
  const storageKey = modo==="mayorista" ? STORAGE_KEY_MAY : STORAGE_KEY_CLI;

  const b = loadLS(storageKey) || {};
  const [vista, setVista] = useState(()=> presupuestoInicial?.items?.length ? "presupuesto" : "catalogo");
  React.useEffect(()=>{
    if (presupuestoInicial && onPresupuestoInicial) {
      if (presupuestoInicial.descuento_pct) setDescuento(String(presupuestoInicial.descuento_pct));
      onPresupuestoInicial();
    }
  },[]);
  const [buscar, setBuscar] = useState(buscarInicial||"");
  const [vistaGrilla, setVistaGrilla] = useState(false);
  const [expandidoKey, setExpandidoKey] = useState(null);
  const [compartirSel, setCompartirSel] = useState({});
  const toggleCompartir = (key, grupo, v, precio) => {
    setCompartirSel(prev => {
      if (prev[key]) { const {[key]:_, ...rest} = prev; return rest; }
      return {...prev, [key]: {articulo: v.articulo||grupo.articulo, medidas: v.medidas, material: grupo.material, precio}};
    });
  };
  const compartirCount = Object.keys(compartirSel).length;
  const enviarCompartir = () => {
    const items = Object.values(compartirSel);
    const modo_url = modo === "mayorista" ? "mayorista" : "clientes";
    // Group by articulo
    const grupos = {};
    items.forEach(i => {
      const k = i.articulo + "||" + i.material;
      if (!grupos[k]) grupos[k] = {articulo: i.articulo, material: i.material, items: []};
      grupos[k].items.push(i);
    });
    let txt = "🌿 *LyL Macetas*\n\n";
    Object.values(grupos).forEach(g => {
      txt += `*${g.articulo}* · ${g.material}\n`;
      g.items.forEach(i => { txt += `  ▫️ ${i.medidas} — $${Math.round(i.precio).toLocaleString("es-AR")}\n`; });
      txt += "\n";
    });
    txt += "_Precios de contado. Con tarjeta según condiciones del banco._";
    window.open("https://wa.me/?text=" + encodeURIComponent(txt), "_blank");
  };
  const [material, setMaterial] = useState("Todos");
  const [pintada, setPintada] = useState("Todos");
  const [precioMin, setPrecioMin] = useState("");
  const [precioMax, setPrecioMax] = useState("");
  const [presupuesto, setPresupuesto] = useState(()=>{
    if (presupuestoInicial?.items?.length) {
      return presupuestoInicial.items.map((i,idx)=>({
        ...i, key:`rec_${idx}`, cantidad:i.cantidad||1, nota:"", sinDesc:false
      }));
    }
    return b.presupuesto||[];
  });
  const [cliente, setCliente] = useState(presupuestoInicial?.cliente||b.cliente||"");
  const [proyecto, setProyecto] = useState(presupuestoInicial?.proyecto||b.proyecto||"");
  const [envio, setEnvio] = useState(b.envio||"");
  const [descuento, setDescuento] = useState(b.descuento ?? (descFijo!==null?descFijo:0));
  const [mostrarAnticipo, setMostrarAnticipo] = useState(b.mostrarAnticipo??true);
  const [textoVis, setTextoVis] = useState(null);
  const [notaAb, setNotaAb] = useState(null);
  const [notaTemp, setNotaTemp] = useState("");
  const [modalMan, setModalMan] = useState(false);
  const [formMan, setFormMan] = useState({articulo:"",medidas:"",precio:"",nota:"",material:"Otros"});
  const [numPresup, setNumPresup] = useState(b.numPresup||"");
  const [confirmarVaciar, setConfirmarVaciar] = useState(false);

  const save = useCallback((extra={})=>{
    saveLS(storageKey,{presupuesto,cliente,proyecto,envio,descuento,mostrarAnticipo,numPresup,...extra});
  },[presupuesto,cliente,proyecto,envio,descuento,mostrarAnticipo,numPresup,storageKey]);

  const asignarNum=()=>{
    if(numPresup) return;
    const n=parseInt(localStorage.getItem(`lyl_num_${modo}`)||"0",10)+1;
    localStorage.setItem(`lyl_num_${modo}`,String(n));
    const num=`${modo==="mayorista"?"PM":"PC"}-${String(n).padStart(3,"0")}`;
    setNumPresup(num); save({numPresup:num});
  };

  const agregar=(grupo,v,precio)=>{
    asignarNum();
    const articuloFinal = v.articulo || grupo.articulo;
    const key=`${articuloFinal}||${v.medidas}||${grupo.material}`;
    setPresupuesto(prev=>{
      const ex=prev.find(i=>i.key===key);
      const nuevo=ex
        ?prev.map(i=>i.key===key?{...i,cantidad:i.cantidad+1}:i)
        :[...prev,{articulo:articuloFinal,medidas:v.medidas,material:grupo.material,
            pintada:grupo.pintada,precio,key,cantidad:1,nota:"",sinDesc:false}];
      saveLS(storageKey,{presupuesto:nuevo,cliente,proyecto,envio,descuento,mostrarAnticipo,numPresup});
      return nuevo;
    });
  };

  const grupos = useMemo(()=>{
    const b2=buscar.toLowerCase();
    const filtrados=productos.filter(p=>{
      const inMat=material==="__MACETAS__" ? MATERIALES_MACETAS.includes(p.material)
        : material==="__INSUMOS__" ? MATERIALES_INSUMOS.includes(p.material)
        : material==="Todos"||p.material===material;
      const inB=!b2||p.articulo.toLowerCase().includes(b2)||p.medidas.toLowerCase().includes(b2);
      const inP=(p.material==="Fibrocemento"||p.material==="Fibra de Vidrio")||pintada==="Todos"||(pintada==="Pintada"&&p.pintada)||(pintada==="Sin pintar"&&!p.pintada);
      const pMin=precioMin?p.precio>=parseFloat(precioMin):true;
      const pMax=precioMax?p.precio<=parseFloat(precioMax):true;
      return inMat&&inB&&inP&&pMin&&pMax;
    });
    const map={};
    filtrados.forEach(p=>{
      const k=`${p.articulo}||${p.material}`;
      if(!map[k]) map[k]={...p,variantes:[]};
      map[k].variantes.push({medidas:p.medidas,precio:p.precio,
        acabados:p.acabados,min_cruda:p.min_cruda,min_imp:p.min_imp,min_pint:p.min_pint,
        may_cruda:p.may_cruda,may_imp:p.may_imp,may_pint:p.may_pint});
    });
    return Object.values(map);
  },[productos,buscar,material,pintada,precioMin,precioMax]);

  const envioNum=parseFloat(String(envio).replace(/[^\d.]/g,""))||0;
  const descPct=parseFloat(String(descuento))||0;
  const subtotal=presupuesto.reduce((s,i)=>s+i.precio*i.cantidad,0);
  const baseDesc=presupuesto.filter(i=>!i.sinDesc).reduce((s,i)=>s+i.precio*i.cantidad,0);
  const montoDesc=Math.round(baseDesc*descPct/100);
  const subtotalDesc=subtotal-montoDesc;
  const totalFinal=subtotalDesc+envioNum;
  const anticipo80=Math.round(totalFinal*.8);
  const saldo20=totalFinal-anticipo80;

  const generarTexto=()=>{
    let t=`🌿 *LyL Macetas* — Presupuesto ${numPresup||""}\n`;
    if(cliente) t+=`Cliente: ${cliente}\n`;
    if(proyecto) t+=`Proyecto: ${proyecto}\n`;
    t+=`Fecha: ${new Date().toLocaleDateString("es-AR")}\n\n`;
    presupuesto.forEach(i=>{
      t+=`  • ${i.articulo}${i.medidas?" "+i.medidas:""} — ${i.cantidad} u. × ${fmt(i.precio)} = ${fmt(i.precio*i.cantidad)}`;
      if(i.nota) t+=`\n    _${i.nota}_`;
      t+="\n";
    });
    t+=`\n*Subtotal: ${fmt(subtotal)}*`;
    if(descPct>0) t+=`\n🏷 Descuento ${descPct}%: -${fmt(montoDesc)}`;
    if(envioNum>0) t+=`\n🚚 Envío: ${fmt(envioNum)}`;
    t+=`\n\n*TOTAL: ${fmt(totalFinal)}*`;
    if(mostrarAnticipo) t+=`\n\n_Anticipo 80%: ${fmt(anticipo80)}_\n_Saldo: ${fmt(saldo20)}_`;
    return t;
  };

  const generarJson=()=>JSON.stringify({
    numero:numPresup,cliente,proyecto,
    fecha:new Date().toLocaleDateString("es-AR"),
    items:presupuesto.map(i=>({articulo:i.articulo,medidas:i.medidas,material:i.material,
      cantidad:i.cantidad,precio:i.precio,total:i.precio*i.cantidad,nota:i.nota,sin_descuento:i.sinDesc||false})),
    subtotal,descuento_pct:descPct,descuento_monto:montoDesc,envio:envioNum,total:totalFinal,
    anticipo_80:mostrarAnticipo?anticipo80:null,saldo:mostrarAnticipo?saldo20:null
  },null,2);

  const exportar=()=>{
    const nombre=[numPresup,cliente].filter(Boolean).join("_").replace(/\s+/g,"_")||"borrador";
    const blob=new Blob([JSON.stringify({presupuesto,cliente,proyecto,envio,descuento,numPresup,mostrarAnticipo},null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download=`LyL_${nombre}.json`;a.click();URL.revokeObjectURL(url);
  };

  const importar=(ev)=>{
    const file=ev.target.files?.[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=e2=>{
      try{
        const d=JSON.parse(e2.target.result);
        if(!d.presupuesto){alert("Archivo no válido.");return;}
        setPresupuesto(d.presupuesto||[]);setCliente(d.cliente||"");setProyecto(d.proyecto||"");
        setEnvio(d.envio||"");setDescuento(d.descuento??0);setNumPresup(d.numPresup||"");
        setMostrarAnticipo(d.mostrarAnticipo??true);saveLS(storageKey,d);setVista("presupuesto");
      }catch{alert("Error al leer el archivo.");}
    };
    reader.readAsText(file);ev.target.value="";
  };

  const vaciar=()=>{
    setPresupuesto([]);setCliente("");setProyecto("");setEnvio("");
    setDescuento(descFijo!==null?descFijo:0);setNumPresup("");setTextoVis(null);
    clearLS(storageKey);setConfirmarVaciar(false);
  };

  const guardarNota=(key)=>{
    setPresupuesto(prev=>prev.map(i=>i.key===key?{...i,nota:notaTemp}:i));
    setNotaAb(null);
  };

  const guardarManual=()=>{
    const pr=parseFloat(String(formMan.precio).replace(/[^\d.]/g,""))||0;
    if(!formMan.articulo.trim()||!pr) return;
    const key=`manual||${Date.now()}`;
    setPresupuesto(prev=>[...prev,{articulo:formMan.articulo.trim(),medidas:formMan.medidas.trim(),
      material:formMan.material||"Manual",pintada:false,precio:pr,key,cantidad:1,nota:formMan.nota.trim(),sinDesc:false}]);
    setModalMan(false);
  };

  const n = presupuesto.length;

  // CATALOGO VIEW
  const catalogo = e('div', null,
    e(Filtros,{buscar,setBuscar,material,setMaterial,pintada,setPintada,color,modo,precioMin,setPrecioMin,precioMax,setPrecioMax,onToggleVista:v=>{setVistaGrilla(v==="grilla");setExpandidoKey(null);},vistaActual:vistaGrilla?"grilla":"lista"}),
    e('div', { style:{ padding:"0 14px 80px" } },
      grupos.length===0
        ?e('div',{style:{textAlign:"center",color:"#aaa",padding:40}},"Sin resultados")
        :vistaGrilla
          ? e('div', { style:{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, padding:"0 0 10px" } },
              grupos.map((g,i) => {
                const gKey = g.articulo+"||"+g.material;
                return e(CardGrilla,{key:i,grupo:g,onAgregar:agregar,descPct:0,modo,adminMode,
                  expandido:expandidoKey===gKey,
                  onToggle:()=>setExpandidoKey(expandidoKey===gKey?null:gKey)});
              })
            )
          : grupos.map((g,i)=>e(ProductoCard,{key:i,grupo:g,onAgregar:agregar,descPct:0,modo,adminMode,
              compartirSel,toggleCompartir})),
      e('div', { style:{ height:80 } }),
      compartirCount > 0 && e('div', { style:{
          position:"fixed", bottom:20, left:"50%", transform:"translateX(-50%)",
          zIndex:100, display:"flex", gap:8 } },
        e('button', { onClick:enviarCompartir, style:{
            padding:"12px 20px", borderRadius:30, border:"none",
            background:"#25D366", color:"#fff", fontSize:13, fontWeight:700,
            boxShadow:"0 4px 16px rgba(0,0,0,0.2)", whiteSpace:"nowrap" } },
          `📤 Compartir (${compartirCount})`),
        e('button', { onClick:()=>setCompartirSel({}), style:{
            padding:"12px 14px", borderRadius:30, border:"none",
            background:"#fff", color:"#888", fontSize:13, fontWeight:700,
            boxShadow:"0 4px 16px rgba(0,0,0,0.15)" } }, "✕")
      )
    )
  );

  // PRESUPUESTO VIEW
  const presupVista = e('div', { style:{ padding:"12px 14px 80px" } },
    // Header
    e('div', { style:{ background:"#fff", borderRadius:10, padding:12, border:"1px solid #e8e4de", marginBottom:10 } },
      e('div', { style:{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 } },
        e('span', { style:{ fontSize:12, color, fontWeight:700 } }, numPresup||"Nº pendiente"),
        e('button', { onClick:()=>setModalMan(true), style:{ padding:"4px 10px", borderRadius:7,
            border:`1px solid ${color}`, background:"transparent", color, fontSize:11 } }, "+ Manual")
      ),
      e(Input,{value:cliente,onChange:v=>{setCliente(v);save({cliente:v});},placeholder:"Cliente",style:{marginBottom:6}}),
      e(Input,{value:proyecto,onChange:v=>{setProyecto(v);save({proyecto:v});},placeholder:"Proyecto / Dirección"})
    ),

    // Items
    n===0
      ?e('div',{style:{textAlign:"center",color:"#aaa",padding:30,fontSize:13}},"El presupuesto está vacío.\nBuscá productos en 🔍 Catálogo")
      :presupuesto.map(item=>
        e('div',{key:item.key,style:{background:"#fff",borderRadius:10,padding:"10px 12px",marginBottom:6,border:"1px solid #e8e4de"}},
          e('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}},
            e('div',{style:{flex:1}},
              e('div',{style:{fontSize:13,fontWeight:700,color:"#2c2c2c"}},item.articulo+(item.medidas?" "+item.medidas:"")),
              e('div',{style:{display:"flex",gap:6,marginTop:3,flexWrap:"wrap",alignItems:"center"}},
                e(Badge,{text:item.material,color:MAT_COLORS[item.material]||"#888"}),
                e('span',{style:{fontSize:11,color}},fmt(item.precio)+" c/u"),
                e('label',{style:{display:"flex",alignItems:"center",gap:4,fontSize:10,color:item.sinDesc?"#e07b39":"#aaa",cursor:"pointer"}},
                  e('input',{type:"checkbox",checked:item.sinDesc||false,
                    onChange:()=>setPresupuesto(prev=>prev.map(i=>i.key===item.key?{...i,sinDesc:!i.sinDesc}:i)),
                    style:{accentColor:"#e07b39"}}),
                  "sin desc."
                )
              )
            ),
            e('button',{onClick:()=>setPresupuesto(prev=>prev.filter(i=>i.key!==item.key)),
              style:{background:"transparent",border:"none",color:"#ccc",fontSize:18,padding:"0 4px"}},"×")
          ),
          e('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:4}},
            e('div',{style:{display:"flex",alignItems:"center",gap:8}},
              e('button',{onClick:()=>setPresupuesto(prev=>prev.map(i=>i.key===item.key?{...i,cantidad:Math.max(1,i.cantidad-1)}:i)),
                style:{width:24,height:24,borderRadius:"50%",border:`1px solid ${color}`,background:"transparent",color,fontSize:16}},"−"),
              e('span',{style:{fontSize:14,fontWeight:700,color:"#333",minWidth:20,textAlign:"center"}},item.cantidad),
              e('button',{onClick:()=>setPresupuesto(prev=>prev.map(i=>i.key===item.key?{...i,cantidad:i.cantidad+1}:i)),
                style:{width:24,height:24,borderRadius:"50%",border:`1px solid ${color}`,background:"transparent",color,fontSize:16}},"+")
            ),
            e('span',{style:{fontSize:14,fontWeight:700,color}},fmt(item.precio*item.cantidad))
          ),
          notaAb===item.key
            ?e('div',{style:{marginTop:8}},
                e(Input,{value:notaTemp,onChange:setNotaTemp,placeholder:"Nota...",style:{fontSize:12}}),
                e('div',{style:{display:"flex",gap:6,marginTop:4}},
                  e('button',{onClick:()=>guardarNota(item.key),style:{flex:1,padding:5,borderRadius:6,border:"none",background:color,color:"#fff",fontSize:11}},"✓ Guardar"),
                  e('button',{onClick:()=>setNotaAb(null),style:{padding:"5px 10px",borderRadius:6,border:"1px solid #ddd",background:"transparent",color:"#666",fontSize:11}},"×")
                )
              )
            :e('button',{onClick:()=>{setNotaAb(item.key);setNotaTemp(item.nota||"");},
                style:{marginTop:5,background:"transparent",border:"none",color:item.nota?color:"#ccc",cursor:"pointer",fontSize:10,padding:0}},
                item.nota?`📝 ${item.nota}`:"+nota")
        )
      ),

    // Totales
    n>0 && e('div',{style:{background:"#fff",borderRadius:10,padding:12,marginTop:4,border:"1px solid #e8e4de"}},
      // Descuento pills
      e('div',{style:{marginBottom:10}},
        e('div',{style:{fontSize:11,color:"#777",marginBottom:6}},"Descuento:"),
        e('div',{style:{display:"flex",gap:6}},
          descOpciones.map(d=>
            e('button',{key:d,onClick:()=>{setDescuento(d);save({descuento:d});},style:{
              flex:1,padding:"5px",borderRadius:8,
              border:`1px solid ${descuento===d?color:"#ddd"}`,
              background:descuento===d?color:"#fff",
              color:descuento===d?"#fff":"#777",fontSize:12,fontWeight:600
            }},d===0?"0%":`-${d}%`)
          )
        )
      ),
      e('div',{style:{display:"flex",gap:8,marginBottom:10}},
        e(Input,{value:envio,onChange:v=>{setEnvio(v);save({envio:v});},placeholder:"Envío $",type:"number",style:{flex:1}}),
      ),
      e('div',{style:{display:"flex",justifyContent:"space-between",fontSize:13,color:"#888",marginBottom:3}},e('span',null,"Subtotal"),e('span',null,fmt(subtotal))),
      descPct>0&&e('div',{style:{display:"flex",justifyContent:"space-between",fontSize:13,color:"#e07b39",marginBottom:3}},e('span',null,`Descuento ${descPct}%`),e('span',null,`-${fmt(montoDesc)}`)),

function PanelAdmin({ productos, onVolver }) {
  const [buscar, setBuscar] = useState("");
  const [material, setMaterial] = useState("Todos");
  const [editando, setEditando] = useState(null);
  const [costos, setCostos] = useState(()=>{ const r=loadLS("lyl_costos_v1"); return r||{}; });

  const saveCostos=(c)=>{ setCostos(c); saveLS("lyl_costos_v1",c); };

  const grupos = useMemo(()=>{
    const b=buscar.toLowerCase();
    const filtrados=productos.filter(p=>{
      const inM=material==="Todos"||p.material===material;
      const inB=!b||p.articulo.toLowerCase().includes(b)||p.medidas.toLowerCase().includes(b);
      return inM&&inB;
    });
    const map={};
    filtrados.forEach(p=>{
      const k=`${p.articulo}||${p.material}`;
      if(!map[k]) map[k]={...p,variantes:[]};
      map[k].variantes.push({medidas:p.medidas,precio_min:p.precio_min,precio_may:p.precio_may});
    });
    return Object.values(map);
  },[productos,buscar,material]);

  return e('div',{style:{maxWidth:480,margin:"0 auto",minHeight:"100vh",background:"#f8f6f2"}},
    e(Header,{modo:"admin",color:"#333",fecha:null,itemCount:0,vistaActual:"catalogo",onCambiarVista:()=>{},onVolver}),
    e('div',{style:{padding:"12px 14px"}},
      e('div',{style:{background:"#fff3cd",borderRadius:10,padding:"10px 12px",marginBottom:12,border:"1px solid #ffc107"}},
        e('div',{style:{fontSize:12,fontWeight:700,color:"#856404",marginBottom:3}},"🔐 Modo Admin"),
        e('div',{style:{fontSize:11,color:"#856404"}},"Podés cargar costos para ver el margen de cada producto. Se guardan localmente en este dispositivo.")
      ),
      e(Input,{value:buscar,onChange:setBuscar,placeholder:"🔍 Buscar producto..."}),
      e('div',{style:{display:"flex",gap:5,flexWrap:"wrap",margin:"8px 0 12px"}},
        ["Todos",...MATERIALES_TODOS].map(m=>
          e(Pill,{key:m,label:m,active:material===m,color:"#333",onClick:()=>setMaterial(m)})
        )
      ),
      grupos.map((grupo,idx)=>{
        const dc=MAT_COLORS[grupo.material]||"#888";
        return e('div',{key:idx,style:{background:"#fff",borderRadius:10,marginBottom:8,border:"1px solid #e8e4de",overflow:"hidden"}},
          e('div',{style:{padding:"9px 12px 7px",borderBottom:"1px solid #f0ede8",display:"flex",justifyContent:"space-between",alignItems:"center"}},
            e('div',null,
              e('div',{style:{fontWeight:700,fontSize:13,color:"#2c2c2c"}},grupo.articulo),
              e('div',{style:{display:"flex",gap:5,alignItems:"center",marginTop:2}},
                e('div',{style:{width:6,height:6,borderRadius:"50%",background:dc}}),
                e('span',{style:{fontSize:10,color:"#999"}},grupo.material)
              )
            )
          ),
          grupo.variantes.map((v,vi)=>{
            const costoKey=`${grupo.articulo}||${v.medidas}||${grupo.material}`;
            const costo=costos[costoKey]||0;
            const margenMin=costo>0?Math.round((v.precio_min/costo-1)*100):null;
            const margenMay=costo>0?Math.round((v.precio_may/costo-1)*100):null;
            return e('div',{key:vi,style:{padding:"8px 12px",borderBottom:vi<grupo.variantes.length-1?"1px solid #f5f3ef":"none"}},
              e('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}},
                e('span',{style:{fontSize:12,color:"#666"}},(v.medidas||"—")),
                editando===costoKey
                  ? e('div',{style:{display:"flex",gap:6,alignItems:"center"}},
                      e('input',{type:"number",placeholder:"Costo $",
                        defaultValue:costo||"",
                        id:`inp_${costoKey.replace(/[^a-z0-9]/gi,"_")}`,
                        style:{width:100,padding:"4px 7px",borderRadius:6,border:"1px solid #4a7c59",fontSize:12,fontFamily:"inherit"}}),
                      e('button',{onClick:()=>{

                          const nuevo={...costos,[costoKey]:val};saveCostos(nuevo);setEditando(null);
                        },style:{padding:"4px 8px",borderRadius:6,border:"none",background:"#4a7c59",color:"#fff",fontSize:11}},"✓"),
                      e('button',{onClick:()=>setEditando(null),style:{padding:"4px 8px",borderRadius:6,border:"1px solid #ddd",background:"transparent",color:"#888",fontSize:11}},"×")
                    )
                  : e('button',{onClick:()=>setEditando(costoKey),style:{padding:"3px 8px",borderRadius:6,border:"1px solid #ddd",background:"transparent",color:"#888",fontSize:10}},
                      costo>0?`💰 ${fmt(costo)}`:"+ costo")
              ),
              e('div',{style:{display:"flex",gap:10}},
                e('div',{style:{flex:1,background:"#f0f7f2",borderRadius:8,padding:"6px 8px"}},

                  e('div',{style:{fontSize:13,fontWeight:700,color:"#1a3f52"}},fmt(v.precio_may)),
                  margenMay!==null&&e('div',{style:{fontSize:10,color:margenMay>20?"#2e7d32":margenMay>10?"#e07b39":"#c0392b"}},`Margen: ${margenMay}%`)
                )
              )
            );
          })
        );
      })
    )
  );
}

// PANEL REGISTRO Y ESTADÍSTICAS
// ─────────────────────────────────────────────
function PanelRegistro({ onVolver, onRecuperar }) {
  const { useState, useEffect, useMemo } = React;
  const [registros, setRegistros] = useState([]);
  const [tab, setTab] = useState("lista");
  const [filtroEstado, setFiltroEstado] = useState("todos");
  const [filtroTipo, setFiltroTipo] = useState("todos");
  const [expandido, setExpandido] = useState(null);
  const fmt = v => "$ " + Math.round(v||0).toLocaleString("es-AR");

  useEffect(() => { setRegistros(loadRegistro()); }, []);

  const cambiarEstado = (id, estado) => {
    const nuevo = registros.map(r => r.id===id ? {...r, estado} : r);
    setRegistros(nuevo); saveRegistro(nuevo);
  };

  const eliminar = (id) => {
    if (!confirm("¿Eliminar este registro?")) return;
    const nuevo = registros.filter(r => r.id !== id);
    setRegistros(nuevo); saveRegistro(nuevo);
  };

  const recuperar = (r) => {
    if (!confirm(`¿Recuperar el presupuesto de ${r.cliente || "este cliente"} en el presupuestador?`)) return;
    onRecuperar(r);
  };

  const exportar = () => {
    const blob = new Blob([JSON.stringify(registros, null, 2)], {type:"application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob); a.download = "lyl_registro.json"; a.click();
  };

  const tipoLabel = { mayorista:"📦 May", clientes:"⭐ Cli", minorista:"🌿 Min" };
  const tipoColor = { mayorista:"#2c5f7a", clientes:"#8b5e3c", minorista:"#4a7c59" };
  const estadoColor = { enviado:"#e07b39", aprobado:"#2d6a4a", rechazado:"#c0392b" };
  const estadoLabel = { enviado:"Enviado", aprobado:"Aprobado", rechazado:"Rechazado" };

  const filtrados = useMemo(() => registros.filter(r => {
    const okEstado = filtroEstado === "todos" || r.estado === filtroEstado;
    const okTipo = filtroTipo === "todos" || r.tipo === filtroTipo;
    return okEstado && okTipo;
  }), [registros, filtroEstado, filtroTipo]);

  const stats = useMemo(() => {
    const aprobados = registros.filter(r => r.estado === "aprobado");
    const enviados = registros.filter(r => r.estado === "enviado");
    const rechazados = registros.filter(r => r.estado === "rechazado");
    const totalVendido = aprobados.reduce((s,r) => s + (r.total||0), 0);
    const tasaAprobacion = registros.length > 0 ? Math.round(aprobados.length / registros.length * 100) : 0;
    const ticketPromedio = aprobados.length > 0 ? Math.round(totalVendido / aprobados.length) : 0;

    // Por tipo
    const porTipo = {
      mayorista: aprobados.filter(r=>r.tipo==="mayorista").reduce((s,r)=>s+(r.total||0),0),
      clientes:  aprobados.filter(r=>r.tipo==="clientes").reduce((s,r)=>s+(r.total||0),0),
      minorista: aprobados.filter(r=>r.tipo==="minorista").reduce((s,r)=>s+(r.total||0),0),
    };

    // Productos más pedidos (aprobados)
    const prodMap = {};
    aprobados.forEach(r => {
      (r.items||[]).forEach(i => {
        const k = i.articulo + (i.medidas ? " " + i.medidas : "");
        if (!prodMap[k]) prodMap[k] = {nombre:k, cantidad:0, total:0, material:i.material||""};
        prodMap[k].cantidad += i.cantidad||1;
        prodMap[k].total += (i.precio||0) * (i.cantidad||1);
      });
    });
    const topProductos = Object.values(prodMap).sort((a,b) => b.cantidad-a.cantidad).slice(0,8);

    // Por mes
    const mesesMap = {};
    aprobados.forEach(r => {
      const mes = r.fecha ? r.fecha.slice(3) : "S/F";
      if (!mesesMap[mes]) mesesMap[mes] = {mes, total:0, cant:0};
      mesesMap[mes].total += r.total||0;
      mesesMap[mes].cant += 1;
    });
    const porMes = Object.values(mesesMap).sort((a,b) => a.mes.localeCompare(b.mes));
    const maxMes = porMes.length > 0 ? Math.max(...porMes.map(m=>m.total)) : 1;

    return { totalVendido, tasaAprobacion, ticketPromedio,
      aprobados:aprobados.length, enviados:enviados.length, rechazados:rechazados.length,
      porTipo, topProductos, porMes, maxMes };
  }, [registros]);

  return e("div", { style:{ maxWidth:480, margin:"0 auto", minHeight:"100vh", background:"#f8f6f2" } },
    // Header
    e("div", { style:{ padding:"14px 16px 10px", background:"#fff", borderBottom:"1px solid #e8e4de", position:"sticky", top:0, zIndex:10 } },
      e("div", { style:{ display:"flex", alignItems:"center", gap:10, marginBottom:10 } },
        e("button", { onClick:onVolver, style:{ background:"transparent", border:"none", color:"#aaa", fontSize:18 } }, "←"),
        e("div", { style:{ flex:1 } },
          e("div", { style:{ fontSize:13, fontWeight:700, color:"#333" } }, "📊 Registro & Estadísticas"),
          e("div", { style:{ fontSize:11, color:"#aaa" } }, registros.length + " presupuestos registrados")
        ),
        e("button", { onClick:exportar, style:{ fontSize:11, padding:"5px 10px", borderRadius:7, border:"1px solid #ddd", background:"transparent", color:"#888" } }, "⬇ Exportar")
      ),
      e("div", { style:{ display:"flex", gap:6 } },
        ["lista","stats"].map(t =>
          e("button", { key:t, onClick:()=>setTab(t), style:{
            flex:1, padding:"7px 0", borderRadius:8, border:"none", fontSize:12, fontWeight:600,
            background: tab===t ? "#333" : "#f0ede8", color: tab===t ? "#fff" : "#888"
          }}, t === "lista" ? "📋 Lista" : "📈 Estadísticas")
        )
      )
    ),

    // ── LISTA ──
    tab === "lista" && e("div", null,
      // Filtros
      e("div", { style:{ padding:"8px 12px", background:"#fff", borderBottom:"1px solid #f0ede8" } },
        e("div", { style:{ display:"flex", gap:5, marginBottom:6, overflowX:"auto", whiteSpace:"nowrap" } },
          ["todos","enviado","aprobado","rechazado"].map(est =>
            e("button", { key:est, onClick:()=>setFiltroEstado(est), style:{
              display:"inline-block", padding:"3px 10px", borderRadius:20, fontSize:11,
              border:`1px solid ${filtroEstado===est ? "#333":"#ddd"}`,
              background: filtroEstado===est ? "#333":"transparent",
              color: filtroEstado===est ? "#fff":"#666"
            }}, est==="todos"?"Todos":estadoLabel[est])
          )
        ),
        e("div", { style:{ display:"flex", gap:5, overflowX:"auto", whiteSpace:"nowrap" } },
          ["todos","mayorista","clientes","minorista"].map(t =>
            e("button", { key:t, onClick:()=>setFiltroTipo(t), style:{
              display:"inline-block", padding:"3px 10px", borderRadius:20, fontSize:11,
              border:`1px solid ${filtroTipo===t ? (tipoColor[t]||"#333"):"#ddd"}`,
              background: filtroTipo===t ? (tipoColor[t]||"#333"):"transparent",
              color: filtroTipo===t ? "#fff":"#666"
            }}, t==="todos"?"Todos":tipoLabel[t]||t)
          )
        )
      ),

      filtrados.length === 0
        ? e("div", { style:{ textAlign:"center", padding:40, color:"#aaa" } }, "Sin registros")
        : filtrados.map(r => {
            const exp = expandido === r.id;
            return e("div", { key:r.id, style:{ margin:"10px 12px 0", background:"#fff", borderRadius:12, border:"1px solid #e8e4de", overflow:"hidden" } },
              // Cabecera
              e("div", { onClick:()=>setExpandido(exp?null:r.id), style:{ padding:"10px 12px", cursor:"pointer" } },
                e("div", { style:{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" } },
                  e("div", { style:{ flex:1 } },
                    e("div", { style:{ display:"flex", alignItems:"center", gap:6 } },
                      e("span", { style:{ fontSize:10, padding:"2px 7px", borderRadius:10, fontWeight:700,
                          background:(tipoColor[r.tipo]||"#888")+"22", color:tipoColor[r.tipo]||"#888" } },
                        tipoLabel[r.tipo]||r.tipo),
                      r.numero && e("span", { style:{ fontSize:10, color:"#aaa" } }, r.numero)
                    ),
                    e("div", { style:{ fontSize:13, fontWeight:700, color:"#333", marginTop:3 } }, r.cliente||"Sin nombre"),
                    r.proyecto && e("div", { style:{ fontSize:11, color:"#666" } }, r.proyecto),
                    e("div", { style:{ fontSize:10, color:"#aaa" } }, r.fecha)
                  ),
                  e("div", { style:{ textAlign:"right" } },
                    e("div", { style:{ fontSize:14, fontWeight:700, color:"#2d5a3d" } }, fmt(r.total)),
                    e("div", { style:{ fontSize:10, marginTop:4, padding:"2px 8px", borderRadius:10,
                        background:estadoColor[r.estado]+"22", color:estadoColor[r.estado], fontWeight:600 } },
                      estadoLabel[r.estado]||r.estado),
                    e("div", { style:{ fontSize:12, color:"#aaa", marginTop:4 } }, exp ? "▲" : "▼")

// ─────────────────────────────────────────────
// APP PRINCIPAL
// ─────────────────────────────────────────────
function App() {
  // Detectar modo por URL: ?modo=mayorista | ?modo=minorista | ?modo=clientes
  const modoUrl = useMemo(()=>{
    const p = new URLSearchParams(window.location.search).get("modo");
    return ["minorista","mayorista","clientes","registro"].includes(p) ? p : "selector";
  },[]);
  const buscarUrl = useMemo(()=>{
    return new URLSearchParams(window.location.search).get("buscar") || "";
  },[]);
  // Si entró por link directo, ocultar botón volver al selector
  const linkDirecto = modoUrl !== "selector";
  const [pantalla, setPantalla] = useState(modoUrl);
  const [showSplash, setShowSplash] = useState(() => ["mayorista","clientes"].includes(modoUrl));
  const [adminMode, setAdminMode] = useState(false);
  const [descCliente, setDescCliente] = useState(10);
  const [presupuestoRecuperado, setPresupuestoRecuperado] = useState(null);

  // Combinar datos min y may en estructura unificada para admin
  const productosMin = useMemo(()=>(window.LYL_MIN||[]).map(enriquecerProducto),[]);
  const productosMay = useMemo(()=>(window.LYL_MAY||[]).map(enriquecerProducto),[]);

  // Para el panel admin: fusionar min+may por clave
  const productosAdmin = useMemo(()=>{
    const map={};
    productosMin.forEach(p=>{
      const k=`${p.articulo}||${p.medidas}||${p.material}`;
      if(!map[k]) map[k]={...p,precio_min:p.precio,precio_may:0};
      else map[k].precio_min=p.precio;
    });
    productosMay.forEach(p=>{
      const k=`${p.articulo}||${p.medidas}||${p.material}`;
      if(!map[k]) map[k]={...p,precio_min:0,precio_may:p.precio};
      else map[k].precio_may=p.precio;
    });
    return Object.values(map);
  },[productosMin,productosMay]);

  if(showSplash && ["mayorista","clientes"].includes(pantalla))
    return e(showSplash && pantalla==="mayorista" ? SplashMayorista : SplashClientes, { onEntrar:()=>setShowSplash(false) });
  if(pantalla==="selector")
    return e(PantallaSelector,{
      onSelect:p=>setPantalla(p),
      onAdmin:()=>{setAdminMode(true);setPantalla("admin");}
    });
  if(pantalla==="admin")
    return e(PanelAdmin,{productos:productosAdmin,onVolver:()=>{setAdminMode(false);setPantalla("selector");}});
  if(pantalla==="registro")
    return e(PanelRegistro,{
      onVolver:()=>setPantalla("selector"),
      onRecuperar:(r)=>{
        setPresupuestoRecuperado(r);
        setPantalla(r.tipo==="clientes"?"clientes":"mayorista");
      }
    });
  if(pantalla==="minorista")
    return e(ModoMinorista,{productos:productosMin,onVolver:linkDirecto?null:()=>setPantalla("selector"),adminMode,buscarInicial:buscarUrl});
  if(pantalla==="mayorista")
    return e(Presupuestador,{modo:"mayorista",productos:productosMay,onVolver:linkDirecto?null:()=>setPantalla("selector"),adminMode,buscarInicial:buscarUrl});
  if(pantalla==="clientes")
    return e(Presupuestador,{modo:"clientes",productos:productosMin,descFijo:descCliente,onVolver:linkDirecto?null:()=>setPantalla("selector"),adminMode,buscarInicial:buscarUrl});
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script>
